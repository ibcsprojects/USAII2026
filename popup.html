<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GreenPages</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="gp-popup-header">
    <span class="gp-popup-leaf" aria-hidden="true">🌿</span>
    <h1>GreenPages</h1>
  </header>

  <section class="gp-popup-doc" id="gp-popup-doc">
    <p class="gp-popup-empty">Open a Google Doc to see live flags.</p>
  </section>

  <section class="gp-popup-impact">
    <h2>Your impact so far</h2>
    <div class="gp-impact-grid">
      <div class="gp-impact-stat">
        <span class="gp-impact-value" id="gp-stat-docs">0</span>
        <span class="gp-impact-label">docs guarded</span>
      </div>
      <div class="gp-impact-stat">
        <span class="gp-impact-value" id="gp-stat-sheets">0</span>
        <span class="gp-impact-label">sheets could&nbsp;save</span>
      </div>
      <div class="gp-impact-stat">
        <span class="gp-impact-value" id="gp-stat-trees">0%</span>
        <span class="gp-impact-label">of a tree</span>
      </div>
    </div>
  </section>

  <footer class="gp-popup-footer">
    <a href="https://docs.google.com/document/" target="_blank" rel="noopener">Open Google Docs</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
